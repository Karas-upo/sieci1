<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podgląd schematów</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Pasek nawigacji przyklejony do góry */
        .nav-header {
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .nav-content {
            max-width: 800px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-back {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-back:hover {
            background: var(--primary-hover);
        }

        /* Kontener na zdjęcia */
        .content-container {
            max-width: 800px;
            width: 95%;
            padding: 40px 0;
        }

        .image-wrapper {
            margin-bottom: 60px; /* Duży odstęp między zadaniami */
            text-align: center;
        }

        .image-label {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-align: left;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 4px;
        }

        /* Linia oddzielająca */
        hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-content">
        <span style="font-weight: 700; font-size: 1.2rem;">Przegląd schematów</span>
        <a href="index.html" class="btn-back">POWRÓT DO QUIZU</a>
    </div>
</div>

<div class="content-container">

    <div class="image-wrapper">
        <span class="image-label">Zadanie 15</span>
        <img src="z15.jpg" alt="Zadanie 15">
    </div>

    <div class="image-wrapper">
        <span class="image-label">Zadanie 31</span>
        <img src="z31.jpg" alt="Zadanie 31">
    </div>

    <div class="image-wrapper">
        <span class="image-label">Zadanie 33</span>
        <img src="z33.jpg" alt="Zadanie 33">
    </div>

    <div class="image-wrapper">
        <span class="image-label">Zadanie 34</span>
        <img src="z34.jpg" alt="Zadanie 34">
    </div>

    <div class="image-wrapper">
        <span class="image-label">Zadanie 35</span>
        <img src="z35.jpg" alt="Zadanie 35">
    </div>

    <div class="image-wrapper">
        <span class="image-label">Zadanie 41</span>
        <img src="z41.jpg" alt="Zadanie 41">
    </div>

</div>

</body>
</html>
