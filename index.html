<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
            margin: 0;
        }

        #quiz-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .stats-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #fff;
        }

        .image-container { text-align: center; margin-bottom: 25px; }
        .image-container img {
            max-width: 100%;
            border-radius: 12px;
            border: 2px solid var(--border);
        }

        .answers { list-style: none; padding: 0; display: grid; gap: 12px; }

        .answer-item {
            padding: 16px 20px;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.03);
            font-weight: 500;
        }

        .answer-item:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .answer-item.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.2);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .answer-item.correct {
            border-color: var(--success) !important;
            background: rgba(16, 185, 129, 0.15) !important;
            color: #34d399;
        }

        .answer-item.wrong {
            border-color: var(--danger) !important;
            background: rgba(239, 68, 68, 0.15) !important;
            color: #f87171;
        }

        .controls {
            margin-top: 35px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        button {
            padding: 14px 28px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #btn-check { background: var(--primary); color: white; }
        #btn-check:hover { background: var(--primary-hover); }

        #btn-next { background: #475569; color: white; }

        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .badge {
            font-size: 0.75rem;
            padding: 6px 12px;
            background: var(--border);
            border-radius: 20px;
            color: var(--text-muted);
            font-weight: 600;
        }

        #score-badge {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .results-screen {
            text-align: center;
            padding: 40px 0;
        }

        .results-screen h1 { color: var(--success); font-size: 2.5rem; }
    </style>
</head>

    let currentIdx = 0;
    let selectedIndices = [];
    let score = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function initQuiz() {
        shuffle(quizData);
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        selectedIndices = [];
        document.getElementById('progress').innerText = `Pytanie ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('score-badge').innerText = `Wynik: ${score}`;
        document.getElementById('q-type').innerText = q.multiple ? "Wielokrotny wybór" : "Jednokrotny wybór";
        document.getElementById('q-text').innerText = q.text;

        const imgCont = document.getElementById('q-image');
        imgCont.innerHTML = q.img ? `<img src="${q.img}" alt="Zasób wizualny">` : '';

        const ansList = document.getElementById('q-answers');
        ansList.innerHTML = '';
        q.answers.forEach((ans, i) => {
            const li = document.createElement('li');
            li.className = 'answer-item';
            li.innerText = ans.text;
            li.onclick = () => handleSelect(i, li);
            ansList.appendChild(li);
        });

        document.getElementById('btn-check').style.display = 'block';
        document.getElementById('btn-next').style.display = 'none';
    }

    function handleSelect(idx, el) {
        const q = quizData[currentIdx];
        if (document.getElementById('btn-next').style.display === 'block') return;

        if (!q.multiple) {
            selectedIndices = [idx];
            Array.from(el.parentNode.children).forEach(child => child.classList.remove('selected'));
            el.classList.add('selected');
        } else {
            if (selectedIndices.includes(idx)) {
                selectedIndices = selectedIndices.filter(i => i !== idx);
                el.classList.remove('selected');
            } else {
                selectedIndices.push(idx);
                el.classList.add('selected');
            }
        }
    }

    document.getElementById('btn-check').onclick = () => {
        if (selectedIndices.length === 0) return alert("Proszę wybrać odpowiedź!");

        const q = quizData[currentIdx];
        const items = document.getElementById('q-answers').children;

        // Sprawdzenie czy cała odpowiedź jest poprawna
        let isPerfectlyCorrect = true;

        q.answers.forEach((ans, i) => {
            const isSelected = selectedIndices.includes(i);
            if (ans.correct) {
                items[i].classList.add('correct');
                if (!isSelected) isPerfectlyCorrect = false;
            } else {
                if (isSelected) {
                    items[i].classList.add('wrong');
                    isPerfectlyCorrect = false;
                }
            }
        });

        if (isPerfectlyCorrect) {
            score++;
            document.getElementById('score-badge').innerText = `Wynik: ${score}`;
        }

        document.getElementById('btn-check').style.display = 'none';
        document.getElementById('btn-next').style.display = 'block';
    };

    document.getElementById('btn-next').onclick = () => {
        currentIdx++;
        if (currentIdx < quizData.length) {
            showQuestion();
        } else {
            const percentage = Math.round((score / quizData.length) * 100);
            document.getElementById('quiz-container').innerHTML = `
            <div class="results-screen">
                <h1>Koniec Quizu!</h1>
                <p style="font-size: 1.5rem; margin: 20px 0;">Twój ostateczny wynik to:</p>
                <div style="font-size: 4rem; font-weight: 800; color: var(--primary);">${score} / ${quizData.length}</div>
                <p style="font-size: 1.2rem; color: var(--text-muted);">${percentage}% poprawnych odpowiedzi</p>
                <button onclick="location.reload()" style="margin-top: 30px; background: var(--primary);">Zacznij od nowa</button>
            </div>
        `;
        }
    };

    initQuiz();
</script>
