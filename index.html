<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Główne</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            margin: 0;
        }

        #menu-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .nav-list {
            list-style: none;
            padding: 0;
            display: grid;
            gap: 15px;
        }

        .nav-item {
            text-decoration: none;
            display: block;
            padding: 18px 24px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-item:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
            color: #fff;
        }

        .nav-item i {
            color: var(--primary);
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .nav-item:hover i {
            transform: translateX(5px);
        }

        .footer-badge {
            margin-top: 30px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 6px 16px;
            background: var(--border);
            border-radius: 20px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <div class="header">
            <h1>Panel Sterowania</h1>
            <p>Wybierz moduł, aby kontynuować</p>
        </div>

        <nav class="nav-list">
            <a href="./sieci1/index.html" class="nav-item">
                <span>Test 1</span>
                <i>→</i>
            </a>
            
            <a href="./sieci3/index.html" class="nav-item">
                <span>Test3</span>
                <i>→</i>
            </a>

            <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" class="nav-item">
                <span>Nie klikaj</span>
                <i>→</i>
            </a>

            <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" class="nav-item">
                <span>Nie klikaj</span>
                <i>→</i>
            </a>
        </nav>

        <div class="footer-badge">
            <span class="badge">Wersja 2.0.4</span>
        </div>
    </div>

</body>
</html>
